services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ai-agent-pgvector
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: aiagent
      POSTGRES_USER: aiagent
      POSTGRES_PASSWORD: aiagent
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aiagent"]
      interval: 5s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: ai-agent-kafka
    ports:
      - "9093:9093"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9093,CONTROLLER://0.0.0.0:9094
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9094
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
    volumes:
      - kafka_data:/var/lib/kafka/data

  ollama:
    image: ollama/ollama:latest
    container_name: ai-agent-ollama
    ports:
      - "11435:11434"
    environment:
      OLLAMA_HOST: 0.0.0.0:11434
      OLLAMA_FLASH_ATTENTION: 1
    volumes:
      - ollama_data:/root/.ollama
    entrypoint: >
      sh -c "
      ollama serve &
      sleep 3 &&
      ollama pull nomic-embed-text &&
      ollama pull llama3.2:3b &&
      wait
      "
    healthcheck:
      test: ["CMD-SHELL", "ollama list > /dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 30

  app:
    build: .
    container_name: ai-agent-app
    ports:
      - "8082:8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/aiagent
      SPRING_DATASOURCE_USERNAME: aiagent
      SPRING_DATASOURCE_PASSWORD: aiagent
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: llama3.2:3b
      OLLAMA_EMBEDDING_MODEL: nomic-embed-text
      AI_PROVIDER: ollama
      NVIDIA_API_KEY: ${NVIDIA_API_KEY:-}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-use-32-chars!!}
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
      ollama:
        condition: service_healthy

volumes:
  postgres_data:
  kafka_data:
  ollama_data:
