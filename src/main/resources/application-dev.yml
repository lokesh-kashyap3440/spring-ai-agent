spring:
  config:
    activate:
      on-profile: dev

  ai:
    ollama:
      base-url: http://localhost:11434
      embedding:
        model: nomic-embed-text

  kafka:
    bootstrap-servers: localhost:9093
    consumer:
      group-id: ai-agent-dev
      auto-offset-reset: earliest

app:
  ollama:
    model: llama3.2:3b
    timeout: 180
    max-tokens: 2048
    context-length: 4096
    temperature: 0.7
  agent:
    max-iterations: 10
    memory-size: 20
    verbose: true
  kafka:
    topics:
      events: ai-agent-events-dev
      chat: ai-agent-chat-dev

logging:
  level:
    com.example.aiagent: DEBUG
    org.springframework.kafka: INFO
    org.springframework.ai: INFO