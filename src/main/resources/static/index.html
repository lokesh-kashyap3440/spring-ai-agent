<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Agent</title>
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<style>
  :root { --color-primary: #e94560; --color-bg: #0f0f1a; --color-surface: #1a1a2e; --color-border: #2a2a4a; }
  body { background: var(--color-bg); color: #e0e0e0; }
  .msg-user { background: var(--color-primary); color: #fff; align-self: flex-end; }
  .msg-assistant { background: var(--color-surface); color: #e0e0e0; border: 1px solid var(--color-border); align-self: flex-start; }
  .msg-system { background: #16213e; color: #8899aa; align-self: center; font-size: 0.75rem; padding: 4px 14px; border-radius: 999px; }
  .typing-dot { animation: pulse 1.2s ease-in-out infinite; }
  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes pulse { 0%, 60%, 100% { opacity: 0.3; } 30% { opacity: 1; } }
  .fade-in { animation: fadeIn 0.2s ease-out; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
  .scrollbar-thin { scrollbar-width: thin; scrollbar-color: var(--color-border) transparent; }
  input:focus, button:focus-visible { outline: 2px solid var(--color-primary); outline-offset: 1px; }
</style>
</head>
<body class="h-screen flex flex-col">
  <!-- Auth Screen -->
  <div id="auth-screen" class="hidden flex-1 flex items-center justify-center p-4">
    <div class="w-full max-w-sm bg-[var(--color-surface)] rounded-2xl border border-[var(--color-border)] p-8 fade-in">
      <h1 class="text-2xl font-bold text-center mb-6" style="color:var(--color-primary)">AI Agent</h1>
      <div class="flex mb-6 border-b border-[var(--color-border)]">
        <button id="login-tab" class="flex-1 pb-3 text-sm font-medium border-b-2 transition-colors" style="color:var(--color-primary);border-color:var(--color-primary)" onclick="switchAuth('login')">Login</button>
        <button id="register-tab" class="flex-1 pb-3 text-sm font-medium text-gray-500 border-b-2 border-transparent transition-colors" onclick="switchAuth('register')">Register</button>
      </div>
      <div id="login-form">
        <div class="mb-4">
          <label class="block text-xs text-gray-400 mb-1.5">Username</label>
          <input id="login-user" type="text" class="w-full bg-[var(--color-bg)] border border-[var(--color-border)] rounded-lg px-4 py-2.5 text-sm focus:outline-none" placeholder="Enter username" autocomplete="username">
        </div>
        <div class="mb-4">
          <label class="block text-xs text-gray-400 mb-1.5">Password</label>
          <input id="login-pass" type="password" class="w-full bg-[var(--color-bg)] border border-[var(--color-border)] rounded-lg px-4 py-2.5 text-sm focus:outline-none" placeholder="Enter password" autocomplete="current-password">
        </div>
        <button onclick="login()" class="w-full rounded-lg px-4 py-2.5 text-sm font-medium text-white transition-opacity hover:opacity-90" style="background:var(--color-primary)">Login</button>
        <p id="login-err" class="text-xs text-center mt-3" style="color:var(--color-primary);min-height:1.2em"></p>
      </div>
      <div id="register-form" class="hidden">
        <div class="mb-4">
          <label class="block text-xs text-gray-400 mb-1.5">Username</label>
          <input id="register-user" type="text" class="w-full bg-[var(--color-bg)] border border-[var(--color-border)] rounded-lg px-4 py-2.5 text-sm focus:outline-none" placeholder="Choose a username" autocomplete="username">
        </div>
        <div class="mb-4">
          <label class="block text-xs text-gray-400 mb-1.5">Password</label>
          <input id="register-pass" type="password" class="w-full bg-[var(--color-bg)] border border-[var(--color-border)] rounded-lg px-4 py-2.5 text-sm focus:outline-none" placeholder="Choose a password" autocomplete="new-password">
        </div>
        <button onclick="register()" class="w-full rounded-lg px-4 py-2.5 text-sm font-medium text-white transition-opacity hover:opacity-90" style="background:var(--color-primary)">Register</button>
        <p id="register-err" class="text-xs text-center mt-3" style="color:var(--color-primary);min-height:1.2em"></p>
      </div>
    </div>
  </div>

  <!-- Chat Screen -->
  <div id="chat-screen" class="hidden flex flex-col h-screen">
    <!-- Toolbar -->
    <div class="flex items-center gap-3 px-4 py-3 border-b border-[var(--color-border)] bg-[var(--color-surface)] shrink-0 flex-wrap">
      <span class="text-lg font-bold shrink-0" style="color:var(--color-primary)">AI Agent</span>
      <div id="tool-toggles" class="flex items-center gap-2 flex-wrap text-xs"></div>
      <div class="ml-auto flex items-center gap-3 shrink-0">
        <span id="username-badge" class="text-xs text-gray-400 hidden"></span>
        <button onclick="toggleDocs()" class="text-xs text-gray-400 hover:text-white transition-colors cursor-pointer bg-transparent border-0">
          Docs <span id="doc-count" class="inline-flex items-center justify-center rounded-full px-1.5 text-xs font-medium ml-0.5 align-middle" style="background:var(--color-primary);color:#fff;min-width:18px;height:18px">0</span>
        </button>
        <button onclick="logout()" class="text-xs text-gray-400 hover:text-white transition-colors cursor-pointer bg-transparent border-0">Logout</button>
      </div>
    </div>

    <!-- Docs Panel -->
    <div id="doc-panel" class="hidden border-b border-[var(--color-border)] bg-[var(--color-surface)] max-h-48 overflow-y-auto scrollbar-thin fade-in">
      <div class="p-3 text-xs text-gray-400" id="doc-list"></div>
    </div>

    <!-- Messages -->
    <div id="chat-container" class="flex-1 overflow-y-auto px-4 py-4 space-y-3 scrollbar-thin">
      <div class="msg-system">Connected. Toggle tools above and start chatting.</div>
    </div>

    <!-- Input Area -->
    <div class="flex items-center gap-2 px-4 py-3 border-t border-[var(--color-border)] bg-[var(--color-surface)] shrink-0">
      <input type="file" id="file-input" accept=".pdf,.docx,.txt,.md,.html" class="hidden" onchange="uploadDoc(this)">
      <button onclick="document.getElementById('file-input').click()" id="upload-btn" class="shrink-0 rounded-lg px-3 py-2.5 text-xs font-medium border border-[var(--color-border)] text-gray-400 hover:text-white hover:border-gray-500 transition-colors cursor-pointer bg-transparent">+ Upload</button>
      <input id="msg-input" type="text" class="flex-1 bg-[var(--color-bg)] border border-[var(--color-border)] rounded-lg px-4 py-2.5 text-sm focus:outline-none" placeholder="Type your message..." autofocus>
      <button id="send-btn" onclick="sendMsg()" class="shrink-0 rounded-lg px-4 py-2.5 text-sm font-medium text-white transition-opacity hover:opacity-90 cursor-pointer border-0" style="background:var(--color-primary)">Send</button>
    </div>
  </div>

<script>
const API = '/api';
let sessionId = crypto.randomUUID();

function t() { return localStorage.getItem('jwt'); }
function u() { return localStorage.getItem('user'); }

function af(url, opts = {}) {
  const token = t();
  if (token) opts.headers = { ...opts.headers, Authorization: 'Bearer ' + token };
  return fetch(url, opts).then(r => { if (r.status === 401) { logout(); throw new Error('Session expired'); } return r; });
}

// Auth
function switchAuth(tab) {
  document.getElementById('login-tab').className = 'flex-1 pb-3 text-sm font-medium border-b-2 transition-colors ' + (tab === 'login' ? '' : 'text-gray-500 border-transparent');
  document.getElementById('register-tab').className = 'flex-1 pb-3 text-sm font-medium border-b-2 transition-colors ' + (tab === 'register' ? '' : 'text-gray-500 border-transparent');
  if (tab === 'login') { document.getElementById('login-tab').style.color = 'var(--color-primary)'; document.getElementById('login-tab').style.borderColor = 'var(--color-primary)'; }
  if (tab === 'register') { document.getElementById('register-tab').style.color = 'var(--color-primary)'; document.getElementById('register-tab').style.borderColor = 'var(--color-primary)'; }
  document.getElementById('login-form').classList.toggle('hidden', tab !== 'login');
  document.getElementById('register-form').classList.toggle('hidden', tab !== 'register');
  document.getElementById('login-err').textContent = '';
  document.getElementById('register-err').textContent = '';
}

async function login() {
  const u = document.getElementById('login-user').value.trim(), p = document.getElementById('login-pass').value;
  const er = document.getElementById('login-err'); er.textContent = '';
  if (!u || !p) { er.textContent = 'Fill in all fields'; return; }
  try {
    const r = await fetch(API + '/auth/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username: u, password: p }) });
    const d = await r.json();
    if (!r.ok) { er.textContent = d.error || 'Login failed'; return; }
    localStorage.setItem('jwt', d.token); localStorage.setItem('user', d.username);
    sessionId = crypto.randomUUID(); enterChat();
  } catch (e) { er.textContent = 'Connection error'; }
}

async function register() {
  const u = document.getElementById('register-user').value.trim(), p = document.getElementById('register-pass').value;
  const er = document.getElementById('register-err'); er.textContent = '';
  if (!u || !p) { er.textContent = 'Fill in all fields'; return; }
  try {
    const r = await fetch(API + '/auth/register', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username: u, password: p }) });
    const d = await r.json();
    if (!r.ok) { er.textContent = d.error || 'Registration failed'; return; }
    localStorage.setItem('jwt', d.token); localStorage.setItem('user', d.username);
    sessionId = crypto.randomUUID(); enterChat();
  } catch (e) { er.textContent = 'Connection error'; }
}

function logout() {
  localStorage.removeItem('jwt'); localStorage.removeItem('user');
  document.getElementById('auth-screen').classList.remove('hidden');
  document.getElementById('chat-screen').classList.add('hidden');
}

// Enter chat
async function enterChat() {
  document.getElementById('auth-screen').classList.add('hidden');
  document.getElementById('chat-screen').classList.remove('hidden');
  document.getElementById('username-badge').textContent = u() || '';
  document.getElementById('username-badge').classList.remove('hidden');
  await loadTools(); await loadDocs();
}

// Tools
async function loadTools() {
  try {
    const r = await af(API + '/agent/tools'); const tools = await r.json();
    const c = document.getElementById('tool-toggles'); c.innerHTML = '';
    for (const [name, desc] of Object.entries(tools)) {
      const l = document.createElement('label');
      l.className = 'flex items-center gap-1 text-gray-400 cursor-pointer select-none text-xs';
      l.title = desc;
      l.innerHTML = '<input type="checkbox" checked data-tool="' + name + '" class="accent-pink-500 w-3 h-3">' + name;
      l.querySelector('input').addEventListener('change', function() { l.classList.toggle('text-white', this.checked); l.classList.toggle('text-gray-400', !this.checked); });
      c.appendChild(l);
    }
  } catch (e) { console.error('tools', e); }
}

function selectedTools() {
  const cbs = document.querySelectorAll('#tool-toggles input[type="checkbox"]');
  const s = [];
  for (const cb of cbs) if (cb.checked) s.push(cb.dataset.tool);
  return s;
}

// Messages
function addMsg(role, content, toolsUsed) {
  const c = document.getElementById('chat-container');
  const d = document.createElement('div');
  d.className = 'msg-' + role + ' max-w-[80%] rounded-xl px-4 py-3 text-sm leading-relaxed whitespace-pre-wrap break-words fade-in';
  d.textContent = content;
  if (toolsUsed && toolsUsed.length) {
    const t = document.createElement('div');
    t.className = 'text-[10px] mt-1.5 opacity-60';
    t.style.color = role === 'user' ? '#fff' : 'var(--color-primary)';
    t.textContent = 'tools: ' + toolsUsed.join(', ');
    d.appendChild(t);
  }
  c.appendChild(d);
  c.scrollTop = c.scrollHeight;
}

function typing(on) {
  const c = document.getElementById('chat-container');
  const existing = document.getElementById('typing');
  if (existing) existing.remove();
  if (!on) return;
  const d = document.createElement('div');
  d.id = 'typing';
  d.className = 'msg-assistant flex items-center gap-1.5 px-4 py-3 text-sm';
  d.innerHTML = '<span class="typing-dot">●</span><span class="typing-dot">●</span><span class="typing-dot">●</span>';
  c.appendChild(d);
  c.scrollTop = c.scrollHeight;
}

async function sendMsg() {
  const inp = document.getElementById('msg-input');
  const msg = inp.value.trim();
  if (!msg || !t()) return;
  inp.value = '';
  document.getElementById('send-btn').disabled = true;
  addMsg('user', msg);
  typing(true);
  try {
    const r = await af(API + '/agent/chat', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: msg, sessionId, toolsEnabled: selectedTools() })
    });
    const d = await r.json();
    typing(false);
    addMsg('assistant', d.answer, d.toolsUsed);
  } catch (e) { typing(false); addMsg('system', 'Error: ' + e.message); }
  finally { document.getElementById('send-btn').disabled = false; inp.focus(); }
}

document.getElementById('msg-input').addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); } });
['login-pass','register-pass'].forEach(id => document.getElementById(id).addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); id === 'login-pass' ? login() : register(); } }));

// Docs
async function loadDocs() {
  if (!t()) return;
  try {
    const r = await af(API + '/documents'); const docs = await r.json();
    document.getElementById('doc-count').textContent = docs.length;
    const list = document.getElementById('doc-list');
    if (!docs.length) { list.innerHTML = '<div class="text-gray-500 text-center py-2">No documents uploaded.</div>'; return; }
    list.innerHTML = docs.map(d => {
      const sz = d.size >= 1048576 ? (d.size / 1048576).toFixed(1) + ' MB' : (d.size / 1024).toFixed(1) + ' KB';
      return '<div class="flex items-center gap-2 py-1.5 border-b border-[var(--color-border)] last:border-0">' +
        '<span class="flex-1 truncate text-gray-300" title="' + d.filename + '">' + d.filename + '</span>' +
        '<span class="text-gray-500 shrink-0">' + sz + ' · ' + d.chunks + ' chunks</span>' +
        '<button onclick="delDoc(\'' + d.id + '\')" class="text-xs text-gray-500 hover:text-red-400 transition-colors cursor-pointer bg-transparent border-0 shrink-0">✕</button></div>';
    }).join('');
  } catch (e) { console.error('docs', e); }
}

let docPanelOpen = false;
function toggleDocs() { docPanelOpen = !docPanelOpen; document.getElementById('doc-panel').classList.toggle('hidden', !docPanelOpen); if (docPanelOpen) loadDocs(); }

async function uploadDoc(inp) {
  const f = inp.files[0]; if (!f || !t()) return;
  const btn = document.getElementById('upload-btn'); btn.disabled = true; btn.textContent = '...';
  const fd = new FormData(); fd.append('file', f);
  try {
    const r = await af(API + '/documents/upload', { method: 'POST', body: fd });
    if (!r.ok) { const e = await r.json(); addMsg('system', 'Upload failed: ' + (e.error || '')); }
    else { const d = await r.json(); addMsg('system', 'Uploaded: ' + d.document.filename + ' (' + d.document.chunks + ' chunks)'); }
  } catch (e) { addMsg('system', 'Upload error: ' + e.message); }
  finally { btn.disabled = false; btn.textContent = '+ Upload'; inp.value = ''; loadDocs(); }
}

async function delDoc(id) {
  try { const r = await af(API + '/documents/' + id, { method: 'DELETE' }); if (r.ok) { addMsg('system', 'Document deleted'); loadDocs(); } }
  catch (e) { addMsg('system', 'Delete error'); }
}

// Init
if (t()) { enterChat(); } else { document.getElementById('auth-screen').classList.remove('hidden'); }
</script>
</body>
</html>
